{% extends 'plantilla.html' %}
{% block content %}
<div class="container mt-5 text-start">
    <h1 class="text-center">Configuración</h1>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="nombre" class="">Nombre de la Empresa:</label>
            <input type="text" class="form-control" id="nombre" name="nombre" value="{{ empresa.nombre }}">
        </div>
        <div class="mb-3">
            <label for="cif" class="">CIF:</label>
            <input type="text" class="form-control" id="cif" name="cif" value="{{ empresa.cif }}">
        </div>
        <div class="mb-3">
            <label for="tipo_iva" class="">Tipo de IVA:</label>
            <input type="number" class="form-control" id="tipo_iva" name="tipo_iva" value="{{ empresa.tipo_iva }}">
        </div>
        <div class="mb-3">
            <label for="direccion" class="">Dirección:</label>
            <input type="text" class="form-control" id="direccion" name="direccion" value="{{ empresa.direccion }}">
        </div>
        <div class="d-flex justify-content-center mt-3">
            <button type="submit" class="btn btn-secondary">Guardar</button>
        </div>
    </form>
</div>
{% endblock %}
