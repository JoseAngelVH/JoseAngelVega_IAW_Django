<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    header{
       background-color: red;
       text-align: center;
    }
    #menu-izq{
        float: left;
        width: 20%;
        background-color: blue;
        height: 400px;
        color: white;
        text-align: center;
    }
    #menu-der{
        float: right;
        width: 80%;
        background-color: green;
        height: 400px;
        text-align: center;
    }
    #pie{
        background-color: black;
        color: white;
        text-align: center;
    }
</style>
<body>
    <header>
        <h1>
            DJANGO EN 2ASIR
        </h1>
        <button>
            <a class="btn btn-custom-nav" href="{% url 'inicio' %}">Inicio</a>
        </button>

        <select id="opciones" name="opciones" onchange="if(this.value) location.href=this.value;">
            <option disabled selected value="">Productos</option>
            <option value="{% url 'altas_productos' %}">Altas</option>
            <option value="{% url 'listado_productos' %}">Listado</option>
        </select>
                <!-- hacer un desplegable en los botones de productos y secciones-->
        <select id="opciones" name="opciones" onchange="if(this.value) location.href=this.value;">
            <option disabled selected value="">secciones</option>
            <option value="{% url 'altas_secciones' %}">Altas</option>
            <option value="{% url 'listado_secciones' %}">Listado</option>
        </select>
    </header>

   
    <div id="menu-izq">
        <h3>
            Menu lateral
        </h3>
    </div>

    <div id="menu-der">
        {% block content %}
        {% endblock %}
        <h2>
            <p>
                {{mensaje}}
            </p>
        </h2>
    </div>

    <footer id="pie">
        <p>
            Pagina diseñada para pruebas en django
        </p>
    </footer>
</body>
</html>
